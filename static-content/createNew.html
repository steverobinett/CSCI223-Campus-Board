<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Event</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Create New Event</h1>

        <form class="event-form">

            <label for="id">Event ID</label>
            <input type="text" id="id" name="id" placeholder="(auto-generated later)" disabled>

            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" placeholder="Enter event title" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Enter event details" rows="4"></textarea>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Time</label>
            <input type="time" id="time" name="time" required>

            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Enter location">

            <button type="submit">Create Event</button>

        </form>
    </div>

</body>
</html>
