<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="/css/form.css">
    <script src="/js/userRegistration.js" defer></script>
</head>
<body>
    <div class="form-container">
        <h1>User Registration</h1>
        <form action="/user/registration" method="POST">
            <div class="registration-form">
                <label for="username"><b>User Name</b><span class="required">*</span></label>
                <input type="text" id="username" name="registration" required>
            </div>

            <div class="registration-form">
                <label for="email"><b>Email</b><span class="required">*</span></label>
                <input type="email" id="email" pattern=".+@example\.com">
            </div>

            <div class="registration-form">
                <label for="password"><b>Password</b><span class="required">* </span></label>
                <input type="password" placeholder="Enter Password" id="pwd" name="pwd" pattern="^(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$" 
                title="Minimum of 8 characters. Should have at least one special character and one number and one UpperCase Letter.">
            </div>

            <div class="registration-form">
                <label for="verify-pwd"><b>Verify Password</b><span class="required">*</span></label>
                <input type="password" placeholder="Verify Password" id="verifypwd" name="verify-pwd" required>
            </div>

            <label for="remember">
            <input type="checkbox" checked="checked" id="rememberme" name="remember"> <b>Remember Me</b>
            </label>

            <p>By creating an account, you agree to our <a href="#">Terms of Service</a>.</p>

            <div class="SubmitCancel">
                <button type="button" class="cancelbtn"><b>Cancel</b></button>
                <button type="button" class="submitbtn"><b>Submit</b></button>
            </div>
        </form>
    </div>
</body>
</html>
